services:
  db:
    image: postgres:16
    container_name: oil_flows_db
    environment:
      POSTGRES_USER: oiluser
      POSTGRES_PASSWORD: oilpass
      POSTGRES_DB: oilflows
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oiluser -d oilflows"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: oil_flows_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://oiluser:oilpass@db:5432/oilflows
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
